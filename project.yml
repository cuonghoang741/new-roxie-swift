name: Roxie
options:
  bundleIdPrefix: com.eduto.roxieswift
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.23.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

targets:
  Roxie:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Roxie
        excludes:
          - "Resources/**/*.md"
    resources:
      - path: Roxie/Resources
    info:
      path: Roxie/Info.plist
      properties:
        CFBundleDisplayName: "Bonie"
        CFBundleName: "Bonie"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleLocalizations:
          - en
          - ja
          - ko
        CFBundleDevelopmentRegion: en
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Cần truy cập camera để chụp ảnh tương tác với nhân vật VRM."
        NSMicrophoneUsageDescription: "Cần micro để trò chuyện bằng giọng nói với nhân vật VRM."
        NSPhotoLibraryUsageDescription: "Cần thư viện ảnh để lưu và tải media."
        NSPhotoLibraryAddUsageDescription: "Cần quyền thêm ảnh vào thư viện khi bạn lưu."
        LSApplicationQueriesSchemes:
          - https
          - http
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: "com.eduto.roxieswift.auth"
            CFBundleURLSchemes:
              - roxieswift
    entitlements:
      path: Roxie/Roxie.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eduto.roxieswift
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
